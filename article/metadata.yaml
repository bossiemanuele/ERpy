# Don't forget to surround abstract with double quotes
abstract: "Entropic Regression (ER) is an information-theoretic framework for sparse model
          discovery that leverages mutual information and conditional mutual information to identify 
          relevant functional dependencies in dynamical systems.
          In ER, these information-theoretic quantities are evaluated in conjunction with regression fitting, 
          where dependencies are assessed through residual-based relationships rather than direct variable comparisons. 
          Despite its potential, accessible and lightweight implementations of ER in Python are currently limited, 
          hindering reproducibility and integration with modern data-driven workflows.
          In this paper, we present \texttt{ERpy}, a concise and faithful Python implementation of the 
          Entropic Regression framework that replicates the original methodology. This implementation aims 
          to facilitate reproducibility, support rapid experimentation, and enable broader adoption of Entropic 
          Regression within the scientific and engineering communities.
          The entire codebase is released under the MIT license and is available on GitHub at https://github.com/bossiemanuele/ERpy."

